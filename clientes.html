<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ponte Dourada</title>
    <script src="https://unpkg.com/imask"></script>
    <link rel="stylesheet" href="style.css">
    <script src="scripts.js" defer></script>
</head>

<body>
    <a href="ponteDourada-pagInicial.html" class="btn-home" title="Voltar para a Página Inicial">
        <img src="guiaDeEstilos/001-home.png" alt="Home" class="icon-home">
    </a>
    <div class="window-container">
        <div class="content">
            <div class="logo-box">
                <img src="guiaDeEstilos/logo-fundo-laranja.png" alt="Logo Ponte Dourada" class="logo-img">
            </div>

            <div class="login-container" style="margin-bottom: 40px;">
                <h2 class="login-title">Cadastro de Cliente</h2><br>
                <form class="login-form">
                    <div class="form-group">
                        <label for="nomeCliente">Nome:</label><br>
                        <input type="text" id="nomeCliente" name="nomeCliente" placeholder="Nome completo">
                    </div><br>
                    <div class="form-group">
                        <label for="cpf">CPF:</label><br>
                        <input type="text" id="cpf" name="cpfCliente" placeholder="000.000.000-00">
                    </div><br>
                    <div class="form-group">
                        <label for="dataNascimento">Data de Nascimento:</label><br>
                        <input type="date" id="dataNascimento" name="dataNascimento">
                    </div><br>
                    <div class="form-group">
                        <label for="responsavelId">ID do Responsável:</label><br>
                        <input type="text" id="responsavelId" name="responsavelId" placeholder="Código do Responsável">
                    </div><br>
                    <input type="button" value="Salvar Cliente" class="btn-login" onclick="salvarCliente()">
                </form>
            </div>
        </div>
    </div>
</body>
