<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ponte Dourada</title>
    <link rel="stylesheet" href="style.css">
    <script src="scripts.js" defer></script>
</head>

<body><div class="window-container">
        <div class="content">
            <div class="logo-box">
                
            </div>
    <div class="content">
        <div class="logo-box">
            <img src="guiaDeEstilos/logo-fundo-laranja.png" alt="Logo Ponte Dourada" class="logo-img">
        </div>

        <div class="login-container">
            <h2 class="login-title">Acesso ao Sistema</h2>

            <form class="login-form">
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="text" id="email" name="email" placeholder="Digite seu e-mail">
                </div>

                <div class="form-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" placeholder="Insira sua senha">
                </div>

                <input type="button" value="Entrar" id="login" class="btn-login" onclick="logar()">
            </form>
        </div>
    </div>
    </div>

</body>

</html>
